<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHGN317 Digital Electronics Tutorials</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --secondary: #3498db;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background-color: var(--background);
        }

        .container {
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        /* Strip all template defaults from the root header container */
        #main-header {
            height: auto !important;
            min-height: auto !important;
            padding: 0 !important;
            margin: 0 !important;
            box-shadow: none !important; /* Removes legacy bottom shadows */
            background: transparent !important;
        }

        /* Ensure the wrapper stretches across 100% of the browser width */
        .banner_container {
            width: 100% !important;
            max-width: 100% !important;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
        }

        /* Force the banner asset to scale fluidly with the screen width */
        #header-banner {
            display: block;
            width: 100% !important;
            height: auto !important; 
            max-height: none !important; 
        }

        .tutorial-button {
            display: inline-block;
            padding: 10px 24px; /* Reduced vertical padding (top/bottom) and horizontal padding */
            font-size: 1rem;    /* Scaled font down slightly to maintain proportion */
            font-weight: bold;
            color: white;
            background-color: var(--primary);
            text-decoration: none;
            border-radius: 6px;  /* Adjusted radius slightly for better visual fit */
            border: 2px solid var(--primary);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.15);
        }
        .tutorial-button:hover {
            background-color: var(--secondary);
            border-color: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
        }

        .tutorial-button:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <header id="main-header" data-height-onload="114" data-height-loaded="true" data-fixed-height-onload="106" class="">
        <div class="header_container">
                <a href="https://www.mines.edu">
                    <img src="/mines-institutional-mark.png" width="982" height="258" alt="Colorado School of Mines" id="header-logo" data-height-percentage="65" data-actual-width="982" data-actual-height="258">
                </a>
                
                <img src="/banner.png" alt="Header Banner" id="header-banner">
                
            </div>
        </div> <!-- .container -->
    </header>
    <div class="container">
        <a href="base-conversion.html" class="tutorial-button" style="margin-bottom: 20px;">
            Number System Conversion
        </a>
        <br>
        <a href="twos-complement.html" class="tutorial-button" style="margin-bottom: 20px;">
            Two's Complement
        </a>
        <br>
        <a href="logic-gates.html" class="tutorial-button" style="margin-bottom: 20px;">
            Boolean Logic Gates
        </a>
        <br>
        <a href="demorgans-theorem.html" class="tutorial-button" style="margin-bottom: 20px;">
            DeMorgan's Theorem
        </a>
        <br>
        <a href="noise-margins.html" class="tutorial-button">
            Noise Margins
        </a>
        <a href="transistor-switch.html" class="tutorial-button">
            Transistors as Switches
        </a>
    </div>
    <footer class="academic-footer">
        <p>Developed by Josh Moses with engineering assistance from Google Gemini (July 2026).</p>
    </footer>
</body>
</html>
